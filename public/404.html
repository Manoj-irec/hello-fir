<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Page Not Found</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f6f8fb;
        color: #1f2937;
        padding: 24px;
      }
      main {
        text-align: center;
        max-width: 520px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }
      p {
        margin: 0 0 16px;
        line-height: 1.5;
      }
      a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>The page you requested could not be found.</p>
      <a href="/">Go back to home</a>
    </main>
  </body>
</html>
